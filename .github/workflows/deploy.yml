name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: frontend
        env:
          GITHUB_PAGES: 'true'
          # Set VITE_API_BASE_URL in repo Settings → Secrets → Actions
          # Example: https://your-tunnel.trycloudflare.com
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          # Set VITE_BASE_PATH in repo Settings → Variables → Actions
          # Example: /stock-monitor/  (must match your repo name)
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/stock-monitor/' }}
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
